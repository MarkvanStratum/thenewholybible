<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pago Seguro - Perú</title>
  <meta name="referrer" content="no-referrer">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FDQ6REQWS8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FDQ6REQWS8', { send_page_view: true });
  </script>

  <style>
    :root{
      --bg:#fafafa; --text:#0a2540; --muted:#5b6b82; --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 60px}
    .safe{background:#0a0a0a;color:#fff;font-size:12px;padding:6px 10px}

    .grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}

    .card{background:#fff;border:1px solid var(--line);padding:22px;border-radius:12px}

    .page-title{
      font-size:28px;font-weight:900;display:flex;gap:8px;margin:6px 0 14px
    }
    .stars{color:#f6b80c}
    .reviews{color:#5b6b82;font-size:13px}

    .h2{font-size:18px;font-weight:800;margin:10px 0 14px}
    .sub{font-size:13px;color:#5b6b82}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:620px){.form-grid{grid-template-columns:1fr}}

    .input,.select,.el{
      width:100%;border:1px solid #cfd6e4;border-radius:10px;
      padding:12px;font-size:15px;background:#fff
    }
    .btn{
      width:100%;padding:12px;border:none;border-radius:12px;
      background:#16a34a;color:#fff;font-weight:900;font-size:17px;
      cursor:pointer;margin-top:14px;transition:opacity .2s
    }
    .btn:active{opacity:.8}

    .summary-row{display:flex;justify-content:space-between;margin:8px 0;font-size:15px}
    .total{font-weight:900;font-size:20px;margin-top:14px;border-top:1px solid var(--line);padding-top:14px}

    #loading-overlay{
      position:fixed;inset:0;background:rgba(255,255,255,.9);
      display:flex;align-items:center;justify-content:center;
      z-index:9999;visibility:hidden;opacity:0;transition:opacity .3s
    }
    #loading-overlay[aria-hidden="false"]{visibility:visible;opacity:1}

    .badge-row{display:flex;gap:10px;margin-top:14px;opacity:.6;justify-content:center}
    .badge-row img{height:20px}
  </style>

  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <div class="safe">✓ Conexión segura y cifrada (SSL)</div>

  <div class="wrap">
    <div class="page-title">
      <span>Confirmar pedido</span>
      <div style="display:flex;flex-direction:column;justify-content:center">
        <div class="stars">★★★★★</div>
        <div class="reviews">4.9/5 basado en 1,240 reseñas</div>
      </div>
    </div>

    <div class="grid">
      <div class="left">
        <div class="card">
          <div class="h2">Información de contacto</div>
          <div class="form-grid">
            <input type="text" id="full-name" class="input" placeholder="Nombre completo">
            <input type="email" id="email" class="input" placeholder="Correo electrónico">
          </div>

          <div class="h2" style="margin-top:24px">Dirección de facturación</div>
          <div style="display:grid;gap:10px">
            <input type="text" id="billing-street" class="input" placeholder="Calle y número">
            <div class="form-grid">
              <input type="text" id="billing-city" class="input" placeholder="Ciudad">
              <input type="text" id="billing-postcode" class="input" placeholder="Código Postal">
            </div>
          </div>

          <div class="h2" style="margin-top:24px">Teléfono</div>
          <div style="display:flex;gap:6px">
            <select id="phone-prefix" class="select" style="width:100px">
              <option value="+51">+51 (PE)</option>
            </select>
            <input type="tel" id="phone-number" class="input" placeholder="Número de celular">
          </div>

          <div class="h2" style="margin-top:24px">Información de pago</div>
          <div id="card-element" class="el"></div>
          <div id="card-errors" style="color:#df1b41;font-size:13px;margin-top:8px"></div>

          <button id="pay-button" class="btn">Pagar ahora S/ 5.58</button>

          <div class="badge-row">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
          </div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <div class="h2">Resumen de compra</div>
          <div class="summary-row">
            <span>Subtotal</span>
            <span>S/ 5.58</span>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <span style="color:#16a34a;font-weight:bold">GRATIS</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span>S/ 5.58</span>
          </div>
          <p class="sub" style="margin-top:14px">Los impuestos están incluidos en el precio total.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-overlay" aria-hidden="true">
    <div style="text-align:center">
      <div style="border:4px solid #f3f3f3;border-top:4px solid #16a34a;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto"></div>
      <p style="margin-top:14px;font-weight:bold">Procesando pago...</p>
    </div>
  </div>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    const stripe = Stripe('pk_live_51P0O7K2M6fKzLp0Z...'); // Tu clave pública de Stripe (se mantiene igual)
    const elements = stripe.elements();
    const cardNumber = elements.create('card', {
      style: {
        base: { fontSize: '16px', color: '#0a2540', '::placeholder': { color: '#aab7c4' } }
      }
    });
    cardNumber.mount('#card-element');

    // Lógica para prellenar datos desde la URL (Mantenida igual)
    const urlParams = new URLSearchParams(window.location.search);
    const nameInput = document.getElementById("full-name");
    const emailInput = document.getElementById("email");
    const billingStreet = document.getElementById("billing-street");
    const billingCity = document.getElementById("billing-city");
    const billingPostcode = document.getElementById("billing-postcode");
    const phonePrefix = document.getElementById("phone-prefix");
    const phoneNumber = document.getElementById("phone-number");

    if (urlParams.get("name")) nameInput.value = urlParams.get("name");
    if (urlParams.get("email")) emailInput.value = urlParams.get("email");
    if (urlParams.get("address")) billingStreet.value = urlParams.get("address");
    if (urlParams.get("city")) billingCity.value = urlParams.get("city");
    if (urlParams.get("zip")) billingPostcode.value = urlParams.get("zip");
    if (urlParams.get("phone")) phoneNumber.value = urlParams.get("phone");

    const payBtn = document.getElementById("pay-button");
    payBtn.addEventListener("click", async () => {
      const overlay = document.getElementById("loading-overlay");
      overlay.setAttribute("aria-hidden","false");

      const billingDetails = {
        name: nameInput.value,
        email: emailInput.value,
        phone: phonePrefix.value + phoneNumber.value,
        address: {
          line1: billingStreet.value,
          city: billingCity.value,
          postal_code: billingPostcode.value,
          country: "PE" // Cambiado a Perú
        }
      };

      try {
        const pm = await stripe.createPaymentMethod({
          type: "card",
          card: cardNumber,
          billing_details: billingDetails
        });
        if (pm.error) throw pm.error;

        // Cambiado el endpoint para reflejar el precio en Soles (ej: 5.58)
        const r = await fetch("/api/stripe/s3/one-time-29-95", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            paymentMethodId: pm.paymentMethod.id,
            billingDetails
          })
        });

        const d = await r.json();
        const c = await stripe.confirmCardPayment(d.clientSecret,{
          payment_method: pm.paymentMethod.id
        });

        if (c.error) throw c.error;

        // URL de redirección final
        window.location.href = "https://cudsr.bemobtrcks.com/go/e1420adb-fbc5-4cfe-b0f1-1...";

      } catch (err) {
        overlay.setAttribute("aria-hidden","true");
        document.getElementById("card-errors").textContent = err.message;
      }
    });
  </script>
</body>
</html>
