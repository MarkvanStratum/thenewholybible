<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven's Voices — Secure Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-divine: #c5a059;
            --blue-saint: #2c3e50;
            --bg-heaven: #fdfcfb;
        }
        body { background: var(--bg-heaven); font-family: 'EB Garamond', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .checkout-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid rgba(197,160,89,0.2); }
        .logo { text-align: center; color: var(--gold-divine); font-family: 'Cinzel'; font-size: 30px; margin-bottom: 20px; }
        h2 { font-family: 'Cinzel'; text-align: center; color: var(--blue-saint); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { text-align: center; color: #8a8276; font-style: italic; margin-bottom: 30px; }
        #payment-element { margin-bottom: 24px; }
        .pay-btn { background: var(--gold-divine); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; letter-spacing: 1px; }
        .pay-btn:hover { background: #b38f4d; transform: translateY(-1px); }
        .pay-btn:disabled { opacity: 0.5; cursor: default; }
        #error-message { color: #b03a2e; margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="checkout-box">
        <div class="logo">†</div>
        <h2 id="plan-title">Heaven's Voices</h2>
        <p id="plan-desc">Complete your offering to unlock sacred wisdom.</p>
        
        <form id="payment-form">
            <div id="payment-element"></div>
            <button id="submit" class="pay-btn">Complete Offering</button>
            <div id="error-message"></div>
        </form>
    </div>

    <script>
        // Use your Public Key here
        const stripe = Stripe('pk_live_51TEQzRRwoTkydCMoKlhlp6CF2lQw0YF9QFNoOhLNbsSfbXLq9QDc0lzqRRUaf1fXQjiHrPKey9M76uZBKPjAfHvf00YtU1Gfec');
        
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan') || 'god';
        const token = localStorage.getItem("jwt");

        // UI Updates based on plan
        const titles = { 'god': 'God Access', 'all': 'Full Access', 'lifetime': 'Lifetime Access' };
        document.getElementById('plan-title').innerText = titles[plan] || "Heaven's Voices Offering";

        let elements;

        async function initialize() {
            // We fetch the clientSecret from the new endpoint we added to server.js
            const response = await fetch("/api/create-payment-intent", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ plan }),
            });
            
            const data = await response.json();
            if (data.error) {
                document.getElementById('error-message').innerText = data.error;
                return;
            }

            const { clientSecret } = data;
            elements = stripe.elements({ clientSecret });
            const paymentElement = elements.create("payment");
            paymentElement.mount("#payment-element");
        }

        document.querySelector("#payment-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const submitBtn = document.querySelector("#submit");
            submitBtn.disabled = true;

            const { error } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                    // Redirect back to home with a success flag
                    return_url: window.location.origin + "/?payment=success",
                },
            });

            if (error) {
                document.querySelector("#error-message").textContent = error.message;
                submitBtn.disabled = false;
            }
        });

        initialize();
    </script>
</body>
</html>
